<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juego del Regalo ❤️</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root{
    --primary:#ff4f87;
    --secondary:#ff85a2;
    --dark:#2b2b2b;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
        135deg,
        #ff9eb5,
        #ffc2d1,
        #ffe0e9
    );
    position:relative;
}

/* FONDO ANIMADO */

body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    filter:blur(80px);
    animation:floatBg 10s infinite alternate;
}

body::before{
    top:-100px;
    left:-100px;
}

body::after{
    bottom:-100px;
    right:-100px;
    animation-delay:5s;
}

@keyframes floatBg{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(40px);
    }
}

.container{
    width:100%;
    max-width:430px;
    padding:20px;
    z-index:2;
}

/* TARJETA */

.card{
    background:rgba(255,255,255,.2);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:32px;
    padding:35px 25px;
    text-align:center;
    box-shadow:
    0 10px 40px rgba(0,0,0,.12);
    animation:fadeUp .6s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:white;
    font-size:32px;
    margin-bottom:15px;
    font-weight:700;
}

p{
    color:white;
    opacity:.9;
    line-height:1.6;
    font-size:15px;
}

/* BOTONES */

.btn{
    margin-top:25px;
    border:none;
    background:white;
    color:var(--primary);
    font-size:16px;
    font-weight:600;
    padding:15px 28px;
    border-radius:18px;
    cursor:pointer;
    transition:.25s;
    box-shadow:
    0 8px 20px rgba(0,0,0,.1);
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);
}

.btn:active{
    transform:scale(.97);
}

/* VIDAS */

.lives{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
}

.heart{
    font-size:32px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
    100%{
        transform:scale(1);
    }
}

.lost{
    opacity:.25;
    transform:scale(.8);
    animation:none;
}

/* NIVEL */

.question-level{
    display:inline-block;
    background:rgba(255,255,255,.25);
    color:white;
    padding:10px 18px;
    border-radius:999px;
    margin-bottom:18px;
    font-size:14px;
    font-weight:600;
    backdrop-filter:blur(10px);
}

/* PREGUNTA */

.question{
    color:white;
    font-size:26px;
    font-weight:700;
    line-height:1.4;
    margin-bottom:25px;
}

/* RESPUESTAS */

.answers{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.answer-btn{
    border:none;
    background:rgba(255,255,255,.22);
    color:white;
    padding:16px;
    border-radius:18px;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:.25s;
    backdrop-filter:blur(10px);
}

.answer-btn:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.35);
}

.answer-btn:active{
    transform:scale(.98);
}

/* BARRA */

.progress{
    width:100%;
    height:12px;
    border-radius:999px;
    background:rgba(255,255,255,.2);
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    border-radius:999px;
    background:white;
    transition:.4s;
}

/* FINAL */

.result-icon{
    font-size:90px;
    margin-bottom:15px;
    animation:bounce 1s infinite alternate;
}

@keyframes bounce{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-10px);
    }
}

.gift{
    margin-top:20px;
    color:white;
    font-size:22px;
    font-weight:700;
    line-height:1.5;
}

/* OCULTAR */

.hidden{
    display:none;
}

/* MÓVIL */

@media(max-width:480px){

    .card{
        padding:30px 20px;
        border-radius:28px;
    }

    .question{
        font-size:22px;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- INICIO -->
    <div id="startScreen" class="card">

        <h1>❤️ Juego Especial ❤️</h1>

        <p>
            Responde correctamente todas las preguntas
            antes de quedarte sin vidas.
        </p>

        <button class="btn" onclick="startGame()">
            Comenzar
        </button>

    </div>

    <!-- JUEGO -->
    <div id="gameScreen" class="card hidden">

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="lives" id="lives"></div>

        <div id="questionLevel" class="question-level"></div>

        <div class="question" id="questionText"></div>

        <div class="answers" id="answersContainer"></div>

    </div>

    <!-- VICTORIA -->
    <div id="winScreen" class="card hidden">

        <div class="result-icon">🎉</div>

        <h1>¡Lo conseguiste!</h1>

        <p>
            Has completado todas las preguntas.
        </p>

        <div class="gift" id="giftMessage"></div>

    </div>

    <!-- DERROTA -->
    <div id="loseScreen" class="card hidden">

        <div class="result-icon">💔</div>

        <h1>Fin del juego</h1>

        <p>
            Te has quedado sin vidas.
        </p>

        <button class="btn" onclick="restartGame()">
            Intentar de nuevo
        </button>

    </div>

</div>

<script>

/* ====================================
   MENSAJE FINAL DEL REGALO
==================================== */

const GIFT_MESSAGE =
"🎁 ¡Has conseguido tu regalo! Te lo entregaré en persona muy pronto ❤️";

/* ====================================
   PREGUNTAS
==================================== */

const QUESTIONS = [

{
    level: "🟡 Media",
    question:"¿Qué es lo que me gusta más de ti?",
    answers:[
        "Tus cejas",
        "Tus ojos",
        "Tu sonrisa",
        "Tu pelo"
    ],
    correct:1
},

{
    level: "🟢 Fácil",
    question:"¿Qué llevaba puesto el día que nos conocimos?",
    answers:[
        "Una sudadera",
        "Una camisa",
        "Un plátano",
        "Un polo"
    ],
    correct:2
},

{
    level: "🔴 Difícil",
    question:"¿Qué comida me gusta más?",
    answers:[
        "Kebab",
        "Paella sin verdura",
        "McFlurry",
        "Macarrones"
    ],
    correct:1
},

{
    level: "🟢 Fácil",
    question:"¿Qué siento cuando estoy contigo?",
    answers:[
        "Paz",
        "Felicidad",
        "Confianza",
        "Todas las anteriores ❤️"
    ],
    correct:3
},

{
    level: "🟢 Fácil",
    question:"¿Cuál fue mi jugador favorito de la infancia?",
    answers:[
        "Cristiano Ronaldo",
        "Lionel Messi",
        "Gareth Bale",
        "Oscar Cañellas"
    ],
    correct:2
}

];

/* ====================================
   VARIABLES
==================================== */

let currentQuestion = 0;
let lives = 3;

/* ====================================
   ELEMENTOS
==================================== */

const startScreen =
document.getElementById("startScreen");

const gameScreen =
document.getElementById("gameScreen");

const winScreen =
document.getElementById("winScreen");

const loseScreen =
document.getElementById("loseScreen");

const questionText =
document.getElementById("questionText");

const answersContainer =
document.getElementById("answersContainer");

const livesContainer =
document.getElementById("lives");

const progressBar =
document.getElementById("progressBar");

/* ====================================
   INICIO
==================================== */

function startGame(){

    currentQuestion = 0;
    lives = 3;

    startScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");

    renderLives();
    loadQuestion();
}

/* ====================================
   VIDAS
==================================== */

function renderLives(){

    livesContainer.innerHTML = "";

    for(let i=0;i<3;i++){

        const heart =
        document.createElement("span");

        heart.innerHTML = "❤️";
        heart.classList.add("heart");

        if(i >= lives){
            heart.classList.add("lost");
        }

        livesContainer.appendChild(heart);
    }
}

/* ====================================
   CARGAR PREGUNTA
==================================== */

function loadQuestion(){

    const q =
    QUESTIONS[currentQuestion];

    document.getElementById("questionLevel").textContent =
"Nivel de pregunta: " + q.level;

    questionText.textContent =
    q.question;

    answersContainer.innerHTML = "";

    q.answers.forEach((answer,index)=>{

        const btn =
        document.createElement("button");

        btn.className =
        "answer-btn";

        btn.textContent =
        answer;

        btn.onclick = () =>
        checkAnswer(index);

        answersContainer.appendChild(btn);
    });

    updateProgress();
}

/* ====================================
   PROGRESO
==================================== */

function updateProgress(){

    const percent =
    (currentQuestion /
    QUESTIONS.length) * 100;

    progressBar.style.width =
    percent + "%";
}

/* ====================================
   RESPUESTA
==================================== */

function checkAnswer(selected){
    
    gameScreen.style.transform = "scale(.98)";
    
    setTimeout(()=>{
    gameScreen.style.transform = "scale(1)";
},150);

    const q =
    QUESTIONS[currentQuestion];

    if(selected === q.correct){

        currentQuestion++;

        if(
            currentQuestion >=
            QUESTIONS.length
        ){
            winGame();
            return;
        }

        loadQuestion();

    }else{

        lives--;

        renderLives();

        if(lives <= 0){
            loseGame();
        }
    }
}

/* ====================================
   GANAR
==================================== */

function winGame(){

    gameScreen.classList.add("hidden");
    winScreen.classList.remove("hidden");

    document.getElementById(
        "giftMessage"
    ).textContent =
    GIFT_MESSAGE;
}

/* ====================================
   PERDER
==================================== */

function loseGame(){

    gameScreen.classList.add("hidden");
    loseScreen.classList.remove("hidden");
}

/* ====================================
   REINICIAR
==================================== */

function restartGame(){

    loseScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
}

</script>
<div class="floating-hearts">
    <span>❤️</span>
    <span>💖</span>
    <span>💕</span>
    <span>❤️</span>
    <span>💗</span>
</div>
</body>
</html>
